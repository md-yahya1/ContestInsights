<!DOCTYPE html>
<html>

<head>
    <title>Contest Insights</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            font-family:Arial;
            margin:0;
            background:#0f172a;
            color:white;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            background:#1e293b;
            padding:25px;
            border-radius:15px;
            text-align:center;
        }

        .number{
            font-size:35px;
            font-weight:bold;
            margin-top:10px;
        }

        .section{
            background:#1e293b;
            padding:25px;
            border-radius:15px;
            margin-bottom:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            padding:15px;
            text-align:left;
        }

        tr{
            border-bottom:1px solid #334155;
        }

        canvas{
            background:white;
            border-radius:10px;
            padding:15px;
        }

        a{
            color:#38bdf8;
        }

    </style>
</head>

<body>

<h1>Contest Insights Dashboard</h1>


<div class="cards">

<div class="card">
<p>Total Contests</p>
<div class="number">{{total}}</div>
</div>

<div class="card">
<p>Upcoming</p>
<div class="number">{{upcoming_count}}</div>
</div>

<div class="card">
<p>Past</p>
<div class="number">{{past_count}}</div>
</div>

</div>



<div class="section">

<h2>Upcoming Contests</h2>

<table>

<tr>
<th>Name</th>
<th>Platform</th>
<th>Date</th>
</tr>

{% for contest in upcoming_contests %}

<tr>

<td>{{contest.name}}</td>

<td>{{contest.platform}}</td>

<td>{{contest.start_date}}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/upcoming">View all contests</a>

</div>


<div class="section">

<h2>Contest Distribution</h2>

<canvas id="platformChart"></canvas>

</div>



<script>

fetch("/insights")

.then(response=>response.json())

.then(data=>{

new Chart(
document.getElementById("platformChart"),

{

type:"bar",

data:{

labels:Object.keys(
data.platform_counts
),

datasets:[{

label:"Contests",

data:Object.values(
data.platform_counts
)

}]
}

}

)

})

</script>

</body>
</html>
